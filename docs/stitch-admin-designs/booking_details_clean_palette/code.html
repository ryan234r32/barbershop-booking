<!DOCTYPE html>

<html class="light" lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>1008 Hair Studio - Booking Details</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#003d2b",
                        "surface-container-low": "#F7F2ED",
                        "on-primary-fixed-variant": "#1a503c",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#b7efd4",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#002115",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#404944",
                        "surface-container-highest": "#E9E3DD",
                        "secondary-container": "#b6edc2",
                        "secondary": "#376847",
                        "tertiary-fixed-dim": "#ffb4a7",
                        "outline": "#707974",
                        "on-background": "#121e15",
                        "tertiary": "#470300",
                        "secondary-fixed-dim": "#9dd3aa",
                        "surface-container": "#FFF8F1",
                        "background": "#FFF8F1",
                        "surface-bright": "#FFF8F1",
                        "inverse-on-surface": "#F2EBE5",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#E9E3DD",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#00210e",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-surface": "#121e15",
                        "surface": "#FFF8F1",
                        "tertiary-container": "#65190f",
                        "surface-tint": "#346853",
                        "inverse-primary": "#9cd2b9",
                        "secondary-fixed": "#b9efc5",
                        "on-tertiary-container": "#eb7e6c",
                        "on-primary-container": "#73a891",
                        "on-secondary-container": "#3b6d4b",
                        "on-tertiary-fixed": "#400100",
                        "on-tertiary-fixed-variant": "#7e2b1e",
                        "tertiary-fixed": "#ffdad4",
                        "primary": "#002519",
                        "surface-dim": "#DED9D4",
                        "primary-fixed-dim": "#9cd2b9",
                        "outline-variant": "#C9C4BF",
                        "inverse-surface": "#2d3a30",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#1e5031",
                        "surface-container-high": "#F0EAE4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "Noto Sans TC", "sans-serif"],
                        "body": ["Manrope", "Noto Sans TC", "sans-serif"],
                        "label": ["Manrope", "Noto Sans TC", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .glass-overlay {
            background: rgba(45, 58, 48, 0.5); /* Neutral dark grey/green backdrop */
            backdrop-filter: blur(4px);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background min-h-screen font-body text-on-background selection:bg-primary-container selection:text-on-primary">
<!-- Simulated App Container -->
<div class="relative w-full max-w-[480px] mx-auto h-[884px] overflow-hidden bg-[#FFF8F1] shadow-2xl flex flex-col">
<!-- Background Image with controlled opacity, no tint -->
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1601362840469-51e4d8d58785?auto=format&amp;fit=crop&amp;q=80&amp;w=1080')] bg-cover bg-center opacity-40 grayscale-[20%]" data-alt="Minimalist botanical aesthetic"></div>
<!-- Dimming Overlay -->
<div class="absolute inset-0 glass-overlay z-10"></div>
<!-- Bottom Sheet -->
<div class="absolute bottom-0 left-0 right-0 bg-surface rounded-t-[24px] z-20 flex flex-col max-h-[751px] transform transition-transform duration-300 translate-y-0 shadow-[0_-8px_30px_rgba(0,0,0,0.08)]">
<!-- Handle -->
<div class="w-full flex justify-center pt-4 pb-6 shrink-0">
<div class="w-12 h-1.5 bg-outline-variant/40 rounded-full"></div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 pb-10 flex flex-col gap-8">
<!-- Header & Service Info -->
<div class="flex flex-col gap-4">
<div class="flex items-center gap-3">
<h2 class="font-headline text-3xl font-bold tracking-tight text-on-surface">王小明</h2>
<span class="bg-tertiary-container/10 text-tertiary-container font-label text-xs font-bold tracking-[0.05em] px-2.5 py-1 rounded border border-tertiary-container/20">VIP</span>
</div>
<div class="flex flex-col gap-1.5 pl-1">
<p class="font-body text-lg text-on-surface-variant font-semibold">男士剪髮 · NT$1,000</p>
<p class="font-label text-sm text-primary tracking-[0.1em] font-bold">11:00 — 12:00</p>
</div>
</div>
<!-- Stats -->
<div class="flex flex-col gap-1 pl-1">
<div class="flex items-baseline gap-3">
<span class="font-headline text-2xl font-bold text-on-surface">12 <span class="font-body text-sm font-medium text-on-surface-variant">次來訪</span></span>
<span class="font-body text-sm text-on-surface-variant/60">·</span>
<span class="font-body text-sm font-medium text-on-surface-variant">上次: 3/28</span>
</div>
</div>
<!-- Notes Section -->
<div class="bg-surface-container-low rounded-xl p-5 flex flex-col gap-3 border border-surface-variant/40">
<span class="font-label text-[11px] tracking-[0.1em] text-on-surface-variant/80 uppercase font-bold">備註</span>
<p class="font-body text-on-surface leading-relaxed font-medium">喜歡短一點，頭皮比較敏感</p>
</div>
<!-- Action Area -->
<div class="flex flex-col gap-4 mt-2">
<!-- Row 1: Primary Action -->
<button class="w-full bg-primary-container text-on-primary font-label text-base tracking-[0.05em] font-bold py-4 rounded-xl flex items-center justify-center shadow-md transition-all active:scale-[0.98] hover:bg-primary-container/95">
                    完成 (現金)
                </button>
<!-- Row 2: Secondary Actions -->
<div class="flex gap-3 w-full">
<button class="flex-1 bg-surface-variant text-on-surface font-label text-sm tracking-[0.05em] font-bold py-3.5 rounded-xl transition-colors hover:bg-surface-container-highest active:bg-surface-dim">
                        完成 (轉帳)
                    </button>
<button class="flex-1 bg-surface-variant text-on-surface font-label text-sm tracking-[0.05em] font-bold py-3.5 rounded-xl transition-colors hover:bg-surface-container-highest active:bg-surface-dim">
                        改時間
                    </button>
<!-- Ghost Border fallback for Cancel -->
<button class="flex-1 border border-error/30 text-error font-label text-sm tracking-[0.05em] font-bold py-3.5 rounded-xl bg-transparent transition-colors hover:bg-error-container/20 active:bg-error-container/30">
                        取消
                    </button>
</div>
<!-- Row 3: Tertiary Action (No Show) -->
<div class="pt-4 flex justify-center">
<button class="text-error/80 font-label text-sm tracking-[0.1em] font-bold transition-all hover:text-error hover:underline underline-offset-4">
                        未到
                    </button>
</div>
</div>
<!-- Bottom Footer Link -->
<div class="pt-6 pb-4 flex justify-center">
<button class="flex items-center gap-2 text-primary font-label text-sm tracking-[0.1em] font-bold group">
                    查看客人
                    <span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
