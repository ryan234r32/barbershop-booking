<!DOCTYPE html>

<html class="light" lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                    "borderRadius": {

                    "fontFamily": {
                        "headline": ["Manrope", "Noto Sans TC"],
                        "body": ["Manrope", "Noto Sans TC"],
                        "label": ["Manrope", "Noto Sans TC"]

                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', 'Noto Sans TC', sans-serif; }
        .glass-header { background: rgba(255, 248, 241, 0.8); backdrop-filter: blur(12px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center overflow-hidden">
<!-- Mock iPhone 14 Pro Frame -->
<div class="relative w-[393px] h-[852px] bg-background shadow-2xl overflow-hidden border-[8px] border-on-background rounded-[3rem]">
<!-- Top App Bar (Shared Component Reference) -->
<header class="fixed top-0 w-full z-50 glass-header flex justify-between items-center px-6 py-4 border-b border-outline-variant/40">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-primary-container">
<img class="w-full h-full object-cover" data-alt="close-up portrait of a professional male hair stylist with focused expression in a modern botanical studio setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAwCLtq8x5STAeZOWvE6vSy8Jk9WB5pYVUgORXDKaOummeb45fO-eq0gsrGRhwddN-aH98KdQ-QD3N6xeI2HAqtq80c5H93ltbVpfVgqT6nvZsjnDCChvun9q2JUOOyN_kT870yprlwk7QXRg9RfC--J5JVPqkVWih1W1K_kZv2Jvd4f3b2XQDgSdc-PV5ROd_B2Rzj6GC5WTKYkfGaGzHSKovZIVzqgYy4A1E6LSZizhdlp_iz0uDCNC0JPyt7EUgngJfZPx1C49Hb"/>
</div>
<h1 class="text-xl font-bold text-primary tracking-tight">The Verdant Atelier</h1>
</div>
<span class="material-symbols-outlined text-primary cursor-pointer" data-icon="calendar_today">calendar_today</span>
</header>
<!-- Background Content: Dimmed Calendar View -->
<main class="pt-20 px-4 h-full bg-surface-container-low opacity-40">
<div class="flex justify-between items-center mb-6 px-2">
<div class="text-lg font-bold">April 2024</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-outline">chevron_left</span>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
</div>
<!-- Calendar Grid Mockup -->
<div class="grid grid-cols-7 gap-2 text-center text-[10px] font-bold text-outline mb-4">
<span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
</div>
<div class="grid grid-cols-7 gap-y-6 text-center text-sm font-medium">
<div class="py-2 text-outline-variant">30</div>
<div class="py-2">1</div><div class="py-2">2</div><div class="py-2">3</div><div class="py-2">4</div><div class="py-2">5</div><div class="py-2">6</div>
<div class="py-2">7</div><div class="py-2">8</div><div class="py-2">9</div><div class="py-2">10</div><div class="py-2">11</div><div class="py-2">12</div>
<div class="py-2 bg-secondary-container text-primary rounded-full font-bold">13</div>
<div class="py-2">14</div><div class="py-2">15</div><div class="py-2">16</div><div class="py-2">17</div><div class="py-2">18</div><div class="py-2">19</div><div class="py-2">20</div>
</div>
<!-- Time Slots Mockup -->
<div class="mt-8 space-y-4">
<div class="flex items-center gap-4">
<span class="text-xs text-outline w-10">15:00</span>
<div class="h-[1px] flex-1 bg-outline-variant/40"></div>
</div>
<div class="flex items-center gap-4">
<span class="text-xs text-outline w-10">16:00</span>
<div class="h-[1px] flex-1 bg-primary/20"></div>
</div>
<div class="flex items-center gap-4">
<span class="text-xs text-outline w-10">17:00</span>
<div class="h-[1px] flex-1 bg-outline-variant/40"></div>
</div>
</div>
</main>
<!-- Dimming Overlay -->
<div class="absolute inset-0 bg-on-background/30 z-[60]"></div>
<!-- Bottom Sheet Form -->
<section class="absolute bottom-0 left-0 w-full bg-surface rounded-t-[24px] z-[70] pb-8 pt-2 shadow-2xl transition-transform duration-300">
<!-- Drag Handle -->
<div class="flex justify-center mb-6">
<div class="w-12 h-1.5 bg-[#F3ECE4] rounded-full"></div>
</div>
<div class="px-6 space-y-8">
<!-- Header Section -->
<div class="flex flex-col gap-1">
<h2 class="text-[18px] font-bold text-primary">新增預約</h2>
<p class="text-[14px] font-medium text-primary/50 tracking-wide">4/13 (日) 16:00</p>
</div>
<!-- Source Toggle Segment -->
<div class="flex p-1 bg-surface-container rounded-xl w-fit">
<button class="px-6 py-2 rounded-lg text-sm font-bold bg-primary text-surface transition-all duration-300">電話</button>
<button class="px-6 py-2 rounded-lg text-sm font-medium text-on-surface-variant hover:bg-surface-container-high transition-all">現場</button>
</div>
<!-- Form Fields -->
<div class="space-y-6">
<!-- Customer Name Field with Autocomplete -->
<div class="relative group">
<label class="block text-[11px] font-bold text-primary uppercase tracking-wider mb-1">顧客姓名</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-on-surface placeholder:text-outline/40 font-medium transition-colors" type="text" value="王小"/>
<!-- Autocomplete Dropdown -->
<div class="absolute left-0 right-0 top-full mt-2 bg-surface-container-lowest border border-outline-variant/20 rounded-xl overflow-hidden z-10">
<div class="px-4 py-3 flex items-center justify-between hover:bg-primary-fixed/30 cursor-pointer transition-colors">
<span class="text-sm font-bold text-on-surface">王小明</span>
<span class="text-[11px] font-medium text-on-secondary-container bg-secondary-container px-2 py-0.5 rounded-full">VIP · 12次</span>
</div>
</div>
</div>
<!-- Phone Number Field -->
<div>
<label class="block text-[11px] font-bold text-primary uppercase tracking-wider mb-1">聯絡電話</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-on-surface font-medium transition-colors" placeholder="09xx-xxx-xxx" type="tel"/>
</div>
<!-- Service Selector -->
<div>
<label class="block text-[11px] font-bold text-primary uppercase tracking-wider mb-1">服務項目</label>
<div class="relative">
<select class="w-full appearance-none bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-2 text-on-surface font-medium pr-8 cursor-pointer transition-colors">
<option>男士剪髮 · 60分 · NT$1,000</option>
<option>女士剪髮 · 90分 · NT$1,500</option>
<option>頭皮護理 · 45分 · NT$800</option>
</select>
<span class="material-symbols-outlined absolute right-0 bottom-2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Notes Field -->
<div>
<label class="block text-[11px] font-bold text-primary uppercase tracking-wider mb-2">備註事項</label>
<textarea class="w-full bg-[#F3ECE4] border-none rounded-xl px-4 py-3 text-sm text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 resize-none font-medium transition-shadow" placeholder="輸入預約備註..." rows="2"></textarea>
</div>
</div>
<!-- Action Buttons -->
<div class="flex items-center justify-between pt-4 gap-4">
<button class="px-6 py-3 text-sm font-bold text-outline hover:text-on-surface transition-colors">取消</button>
<button class="flex-1 bg-primary text-on-primary py-4 px-8 rounded-xl font-bold text-sm tracking-wide transition-all active:scale-[0.98] active:brightness-110">確認新增</button>
</div>
</div>
</section>
<!-- Bottom Navigation (Shared Component Reference - Suppressed for focus task) -->
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-surface/80 backdrop-blur-md border-t border-outline-variant/40 z-[80] pointer-events-none opacity-20">
<div class="flex flex-col items-center justify-center text-outline">
<span class="material-symbols-outlined" data-icon="event_note">event_note</span>
<span class="text-[10px] uppercase tracking-tighter mt-1">Schedule</span>
</div>
<div class="flex flex-col items-center justify-center text-outline">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="text-[10px] uppercase tracking-tighter mt-1">Clients</span>
</div>
<div class="flex flex-col items-center justify-center text-outline">
<span class="material-symbols-outlined" data-icon="content_cut">content_cut</span>
<span class="text-[10px] uppercase tracking-tighter mt-1">Services</span>
</div>
<div class="flex flex-col items-center justify-center text-outline">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-[10px] uppercase tracking-tighter mt-1">Settings</span>
</div>
</div>
<!-- Static Decoration: Botanical Accents -->
<div class="absolute -top-10 -right-10 w-40 h-40 rounded-full bg-primary/5 blur-3xl pointer-events-none"></div>
</div>
</body></html>
