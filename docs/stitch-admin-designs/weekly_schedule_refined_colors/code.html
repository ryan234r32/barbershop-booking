<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            font-family: 'Manrope', 'Noto Sans TC', sans-serif;
            background-color: #FFF8F1;
            color: #2D3A30;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: 3rem repeat(7, 1fr);
        }
        .glass-header {

        }
        .booked-cell {
            background-color: rgba(0, 61, 43, 0.18);
        }

            border-color: rgba(0, 61, 43, 0.1);

        }
        .vertical-line {

<style>
    body {

<body class="min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 glass-header flex justify-between items-center px-6 h-16">

<div class="flex items-center gap-1 bg-[#F3ECE4] p-1 rounded-lg">

</div>

</div>
<div class="text-[10px] font-bold text-[#2D3A30]/60 uppercase tracking-widest">April 2024</div>
</div>

<div class="mx-6 mb-4 p-3 bg-[#F3ECE4] rounded-xl flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#003D2B] text-sm" data-icon="event_available">event_available</span>
<span class="text-xs font-medium text-[#2D3A30]">本週: <span class="font-bold text-[#003D2B]">30</span> 預約</span>

</div>
