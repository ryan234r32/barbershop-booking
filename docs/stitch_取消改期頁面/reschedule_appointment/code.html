<!DOCTYPE html>

<html class="light" lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "primary-container": "#003d2b",
                        "secondary-container": "#e5dfd7",
                        "on-surface-variant": "#404944",
                        "on-background": "#1e1b17",
                        "primary-fixed-dim": "#9cd2b9",
                        "primary": "#002519",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#1a503c",
                        "inverse-primary": "#9cd2b9",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#eee7e0",
                        "on-secondary-fixed-variant": "#4a4641",
                        "on-secondary-container": "#66625c",
                        "on-tertiary-container": "#d08d86",
                        "surface-container": "#f4ede6",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface": "#fff8f2",
                        "on-tertiary-fixed": "#360e0c",
                        "primary-fixed": "#b7efd4",
                        "surface-container-low": "#f9f2ec",
                        "on-surface": "#1e1b17",
                        "secondary-fixed-dim": "#ccc6be",
                        "inverse-surface": "#33302c",
                        "on-secondary-fixed": "#1e1b17",
                        "surface-variant": "#e8e1db",
                        "surface-bright": "#fff8f2",
                        "background": "#fff8f2",
                        "on-primary-fixed": "#002115",
                        "on-error-container": "#93000a",
                        "outline": "#707974",
                        "tertiary": "#3b1210",
                        "secondary-fixed": "#e8e1da",
                        "outline-variant": "#c0c9c2",
                        "on-tertiary": "#ffffff",
                        "secondary": "#625e58",
                        "tertiary-fixed-dim": "#fdb4ad",
                        "tertiary-container": "#562723",
                        "inverse-on-surface": "#f6f0e9",
                        "on-tertiary-fixed-variant": "#6b3833",
                        "surface-container-highest": "#e8e1db",
                        "tertiary-fixed": "#ffdad6",
                        "surface-tint": "#346853",
                        "surface-dim": "#dfd9d2",
                        "on-primary-container": "#73a891"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "Noto Sans TC"],
                        "body": ["Manrope", "Noto Sans TC"],
                        "label": ["Manrope", "Noto Sans TC"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Manrope', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-40">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#FFF8F2]/85 dark:bg-[#002519]/85 backdrop-blur-xl transition-colors duration-300 ease-in-out flex justify-between items-center px-6 h-16 shadow-none">
<div class="flex items-center gap-1 text-[#003D2B] dark:text-[#E8E1DB] cursor-pointer">
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_back">arrow_back</span>
<span class="font-['Manrope'] font-semibold tracking-tight">返回</span>
</div>
<h1 class="text-lg font-bold text-[#003D2B] dark:text-[#FFF8F2] font-['Manrope'] font-semibold tracking-tight">Reschedule</h1>
<div class="text-[#003D2B] dark:text-[#E8E1DB] cursor-pointer">
<span class="material-symbols-outlined" data-icon="close">close</span>
</div>
</header>
<main class="pt-16">
<!-- Current Booking Banner -->
<section class="bg-surface-container w-full px-6 py-4 mb-8">
<div class="flex justify-between items-center">
<div class="space-y-1">
<p class="text-on-surface-variant text-[12px] tracking-widest uppercase font-medium">目前預約</p>
<p class="text-[#003D2B] font-semibold text-lg">4/15 (二) · 14:00 — 15:00</p>
</div>
<div class="px-3 py-1 rounded-full border border-outline-variant text-on-surface-variant text-xs font-medium">
                    男性剪髮
                </div>
</div>
</section>
<!-- Choose Date Section -->
<section class="px-6 mb-10">
<h2 class="text-on-surface-variant text-[12px] tracking-widest uppercase font-bold mb-6 flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-primary"></span>
                選擇新日期
            </h2>
<div class="bg-surface-container-low rounded-xl p-5">
<div class="flex justify-between items-center mb-6">
<span class="font-bold text-lg text-primary">April 2026</span>
<div class="flex gap-4">
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_left">chevron_left</span>
<span class="material-symbols-outlined text-primary" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<div class="calendar-grid text-center text-[10px] text-on-secondary-container font-bold mb-4 uppercase tracking-[0.1em]">
<span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
</div>
<div class="calendar-grid text-center gap-y-2">
<!-- Week 1 (Partial) -->
<span class="py-2 text-outline-variant"></span>
<span class="py-2 text-outline-variant"></span>
<span class="py-2 text-outline-variant"></span>
<span class="py-2 text-on-surface">1</span>
<span class="py-2 text-on-surface">2</span>
<span class="py-2 text-on-surface">3</span>
<span class="py-2 text-on-surface">4</span>
<!-- Week 2 -->
<span class="py-2 text-on-surface">5</span>
<span class="py-2 text-outline-variant">6</span>
<span class="py-2 text-on-surface">7</span>
<span class="py-2 text-on-surface">8</span>
<span class="py-2 text-on-surface">9</span>
<span class="py-2 text-on-surface">10</span>
<span class="py-2 text-on-surface">11</span>
<!-- Week 3 -->
<div class="py-1 relative flex flex-col items-center">
<span class="text-on-surface">12</span>
<div class="w-1 h-1 rounded-full bg-primary mt-0.5"></div>
</div>
<span class="py-2 text-outline-variant">13</span>
<span class="py-2 text-on-surface">14</span>
<div class="py-1 relative flex flex-col items-center">
<span class="text-on-surface">15</span>
<div class="w-1 h-1 rounded-full bg-outline-variant mt-0.5"></div>
</div>
<span class="py-2 text-on-surface">16</span>
<div class="flex items-center justify-center">
<span class="w-8 h-8 flex items-center justify-center bg-primary text-white rounded-full font-bold shadow-lg">17</span>
</div>
<span class="py-2 text-on-surface">18</span>
<!-- Week 4 -->
<span class="py-2 text-on-surface">19</span>
<span class="py-2 text-outline-variant">20</span>
<span class="py-2 text-on-surface">21</span>
<span class="py-2 text-on-surface">22</span>
<span class="py-2 text-on-surface">23</span>
<span class="py-2 text-on-surface">24</span>
<span class="py-2 text-on-surface">25</span>
</div>
</div>
</section>
<!-- Choose Time Section -->
<section class="px-6 mb-10">
<div class="bg-surface-container rounded-[12px] p-6">
<h3 class="text-on-surface font-semibold mb-5 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] text-primary" data-icon="schedule">schedule</span>
                    04/17 可預約時間
                </h3>
<div class="grid grid-cols-2 gap-3">
<button class="py-3 px-4 rounded-lg bg-surface-container-highest text-on-surface font-medium text-center border border-transparent active:scale-95 transition-transform">
                        14:00
                    </button>
<button class="py-3 px-4 rounded-lg bg-surface-container-highest text-on-surface font-medium text-center border border-transparent active:scale-95 transition-transform">
                        15:00
                    </button>
<button class="py-3 px-4 rounded-lg bg-primary text-white font-bold text-center active:scale-95 transition-transform shadow-md">
                        16:00
                    </button>
<button class="py-3 px-4 rounded-lg bg-surface-container-highest text-on-surface font-medium text-center border border-transparent active:scale-95 transition-transform">
                        17:00
                    </button>
</div>
</div>
</section>
<!-- Comparison Card -->
<section class="px-6 mb-12">
<div class="bg-[#FFF8F1] rounded-xl border-[1.5px] border-[#003D2B] p-5 shadow-sm overflow-hidden relative">
<div class="absolute top-0 right-0 w-16 h-16 bg-primary/5 rounded-full -mr-8 -mt-8"></div>
<div class="space-y-4">
<div class="flex justify-between items-center">
<span class="text-on-surface-variant/60 text-sm font-medium">原時段</span>
<span class="text-on-surface-variant/60 line-through font-medium">4/15 (二) 14:00</span>
</div>
<div class="h-[1px] bg-outline-variant/15 w-full"></div>
<div class="flex justify-between items-center">
<span class="text-on-surface-variant text-sm font-medium">新時段</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[16px]" data-icon="event_available">event_available</span>
<span class="text-primary font-bold text-lg tracking-tight">4/17 (四) 16:00</span>
</div>
</div>
</div>
</div>
</section>
<!-- Signature Botanical Detail -->
<section class="px-6 flex justify-center opacity-40 grayscale pointer-events-none">
<div class="w-12 h-12 flex items-center justify-center">
<span class="material-symbols-outlined text-[40px] text-primary" data-icon="eco">eco</span>
</div>
</section>
</main>
<!-- Sticky Bottom Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-[#FFF8F1] pb-8 pt-4 px-6 z-50 shadow-[0_-12px_32px_-4px_rgba(30,27,23,0.06)] border-none">
<button class="w-full h-12 bg-[#003D2B] text-white font-bold rounded-lg flex items-center justify-center gap-2 active:scale-95 transition-transform duration-200">
<span>確認改期到 4/17 (四) 16:00</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
<!-- BottomNavBar (Hidden per Suppression Rule for Task-Focused Screens) -->
</body></html>
