<!DOCTYPE html>

<html class="light" lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#ffdad6",
                        "on-tertiary-fixed": "#360e0c",
                        "outline": "#707974",
                        "surface": "#fff8f2",
                        "surface-container-highest": "#e8e1db",
                        "primary": "#002519",
                        "surface-dim": "#dfd9d2",
                        "on-secondary-fixed": "#1e1b17",
                        "background": "#fff8f2",
                        "inverse-primary": "#9cd2b9",
                        "on-secondary-fixed-variant": "#4a4641",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#9cd2b9",
                        "secondary-container": "#e5dfd7",
                        "on-background": "#1e1b17",
                        "on-tertiary-container": "#d08d86",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#002115",
                        "on-surface-variant": "#404944",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e8e1db",
                        "on-secondary-container": "#66625c",
                        "secondary-fixed": "#e8e1da",
                        "secondary": "#625e58",
                        "inverse-on-surface": "#f6f0e9",
                        "tertiary-container": "#562723",
                        "surface-container-high": "#eee7e0",
                        "inverse-surface": "#33302c",
                        "surface-tint": "#346853",
                        "surface-container-low": "#f9f2ec",
                        "on-primary-fixed-variant": "#1a503c",
                        "surface-bright": "#fff8f2",
                        "on-primary-container": "#73a891",
                        "surface-container": "#f4ede6",
                        "on-surface": "#1e1b17",
                        "secondary-fixed-dim": "#ccc6be",
                        "on-secondary": "#ffffff",
                        "tertiary": "#3b1210",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#fdb4ad",
                        "on-tertiary-fixed-variant": "#6b3833",
                        "outline-variant": "#c0c9c2",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "primary-fixed": "#b7efd4",
                        "primary-container": "#003d2b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "Noto Sans TC"],
                        "body": ["Manrope", "Noto Sans TC"],
                        "label": ["Manrope", "Noto Sans TC"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', 'Noto Sans TC', sans-serif; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-nav { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 glass-nav bg-[#FFF8F1]/80 h-14 flex items-center justify-between px-4 max-w-md mx-auto">
<button class="flex items-center gap-1 text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl">arrow_back</span>
<span class="text-sm font-medium">返回</span>
</button>
<span class="font-headline font-bold text-primary tracking-tight">服務項目</span>
<button class="text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</header>
<!-- Main Content -->
<main class="w-full max-w-md px-6 pt-20 pb-24 flex flex-col gap-8">
<!-- Header Text -->
<section class="space-y-1">
<h1 class="text-2xl font-bold text-primary tracking-tight">預約詳情</h1>
<p class="text-on-surface-variant text-sm">確認或調整您的預約時間</p>
</section>
<!-- Booking Summary Card -->
<div class="bg-surface-container-low rounded-xl p-6 shadow-sm flex flex-col gap-4 relative overflow-hidden">
<div class="flex justify-between items-start">
<div class="space-y-1">
<h2 class="text-xl font-bold text-primary leading-tight">男性剪髮</h2>
<p class="text-on-surface-variant font-medium">1008 Hair Studio · 台北店</p>
</div>
<span class="bg-primary-container text-surface-container-lowest px-3 py-1 rounded-full text-xs font-semibold tracking-wide">即將到來</span>
</div>
<div class="space-y-3 pt-2">
<div class="flex items-center gap-3 text-on-surface-variant">
<span class="material-symbols-outlined text-lg">calendar_today</span>
<span class="text-sm font-medium">4/15 (二) · 14:00 — 15:00</span>
</div>
<div class="flex items-center justify-between pt-4 border-t border-outline-variant/20">
<span class="text-sm text-on-surface-variant">應付金額</span>
<span class="text-lg font-bold text-primary">NT$1,000</span>
</div>
</div>
</div>
<!-- Reschedule Section (Priority) -->
<section class="flex flex-col gap-4 border-l-[3px] border-primary-container pl-5">
<div class="space-y-1">
<h3 class="text-lg font-bold text-primary-container">改到其他時間？</h3>
<p class="text-on-secondary-container text-sm">不用取消，直接選新時段就好</p>
</div>
<button class="w-full h-12 bg-primary text-surface rounded-lg font-bold text-sm flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-md">
<span class="material-symbols-outlined text-lg">event_repeat</span>
                選擇新時段
            </button>
</section>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-outline uppercase tracking-widest bg-surface-container-high w-8 h-8 rounded-full flex items-center justify-center">或</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Cancel Section -->
<section class="flex flex-col gap-5">
<div class="space-y-1">
<h3 class="text-lg font-bold text-primary">取消預約</h3>
</div>
<!-- Success Banner -->
<div class="bg-[#4A7C59]/10 rounded-lg p-4 flex gap-3 items-start">
<span class="material-symbols-outlined text-[#4A7C59] mt-0.5">info</span>
<p class="text-sm text-[#4A7C59] font-medium leading-relaxed">
                    此預約可免費取消（距離預約超過 24 小時）
                </p>
</div>
<button class="w-full h-12 bg-transparent border-[1.5px] border-[#A84A3B] text-[#A84A3B] rounded-lg font-bold text-sm active:bg-[#A84A3B]/5 transition-colors">
                確認取消預約
            </button>
</section>
<!-- Aesthetic Footer Image / Asymmetric Decor -->
<div class="mt-8 flex gap-4">
<div class="w-2/3 aspect-[4/3] rounded-lg overflow-hidden grayscale-[0.2] opacity-80">
<img class="w-full h-full object-cover" data-alt="Interior of a luxury hair salon with minimalist wooden furniture and botanical plants under soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLALIICMO_zkodfnKAJ277jqvgII2vJ2S_JNdzvYZHaSoTqoRkSqEzUJKqNrSJrh1VFO46Iaq7yILa-O8IPI0OybLmQZxMo1qNU1Vk1nisQW1akFNBMDHw-80R-nGHN6nFhPgZvmIVXsTEWaCQc5062J0kxu-eXOVrM43SBJA38aDkj0z8L0YK_5Qgz7jeV6NwCXNniBqZaxEYInPU7MmzRg1I-mlJyQ_m9PWcp1RLESR5U3DFDYBgOKM7p6EBRSba-DT-jwwppzM"/>
</div>
<div class="w-1/3 aspect-[4/5] rounded-lg overflow-hidden grayscale-[0.2] opacity-60 mt-6">
<img class="w-full h-full object-cover" data-alt="Close-up of professional hairdresser tools and scissors resting on a clean marble surface with natural shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBC2RWzO6mTKb9CZvkfHCSdeRdZjKFRugloDv9snW4DSv8ocn0equd-i6gXBtDOkiNm7woXEMemx9KUvdjP9_CUkMThWAoXmuH-_nJIgVbaKCLSDOSypkx95zkSOeQa_FRWRzoO9nIzvUzIvkSY5C5Zy4_uTIj_0ru5MQRKX-YFJaEfUbuBmCxdo6x_6gDuG3aO7JyAdo-rIKfzlub0EHJ9C6fHSYb75laa356bkdNwzJSuKzeGlqbKOwqniRCYs9YYzn3o7-tIpMM"/>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 w-full z-50 glass-nav bg-[#FFF8F2]/85 max-w-md mx-auto pb-safe">
<div class="flex justify-around items-center w-full px-4 py-3">
<div class="flex flex-col items-center justify-center text-[#003D2B] bg-[#E8E1DB] rounded-lg px-3 py-1 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="font-label text-[10px] uppercase tracking-[0.05em] font-semibold mt-1">預約</span>
</div>
<div class="flex flex-col items-center justify-center text-[#7E766F] px-3 py-1 hover:text-[#002519] active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label text-[10px] uppercase tracking-[0.05em] font-semibold mt-1">作品</span>
</div>
<div class="flex flex-col items-center justify-center text-[#7E766F] px-3 py-1 hover:text-[#002519] active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="content_cut">content_cut</span>
<span class="font-label text-[10px] uppercase tracking-[0.05em] font-semibold mt-1">設計師</span>
</div>
<div class="flex flex-col items-center justify-center text-[#7E766F] px-3 py-1 hover:text-[#002519] active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label text-[10px] uppercase tracking-[0.05em] font-semibold mt-1">我的</span>
</div>
</div>
</nav>
</body></html>
