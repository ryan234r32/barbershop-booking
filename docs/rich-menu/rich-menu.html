<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>1008 Hair Studio — 6 格 Rich Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --forest: #003D2B;
    --forest-dark: #00261B;
    --cream: #FFF8F1;
    --cream-soft: #F7EBDD;
    --ink-soft: rgba(255, 248, 241, 0.68);
    --green-soft: rgba(0, 61, 43, 0.62);
    --line-light: rgba(255, 248, 241, 0.22);
    --line-dark: rgba(0, 61, 43, 0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--cream);
    overflow: hidden;
    font-family: "Manrope", "Noto Sans TC", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .grid {
    position: fixed;
    top: 0;
    left: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
  }

  .cell {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 5.4%;
  }

  .top {
    background: var(--forest);
    color: var(--cream);
  }

  .bottom {
    background: var(--cream);
    color: var(--forest);
  }

  .top + .top {
    border-left: 2px solid var(--line-light);
  }

  .bottom {
    border-top: 2px solid var(--line-dark);
  }

  .bottom + .bottom {
    border-left: 2px solid var(--line-dark);
  }

  .icon {
    font-family: "Material Symbols Outlined";
    font-variation-settings: "FILL" 0, "wght" 350, "GRAD" 0, "opsz" 48;
    font-size: 140px;
    line-height: 1;
    margin-bottom: 36px;
  }

  .title {
    font-family: "Noto Sans TC", sans-serif;
    font-size: 92px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: 0;
    white-space: nowrap;
  }

  .subtitle {
    margin-top: 20px;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .top .subtitle { color: var(--ink-soft); }
  .bottom .subtitle { color: var(--green-soft); }

  .cell::after {
    content: "";
    position: absolute;
    inset: 28px;
    border-radius: 22px;
    pointer-events: none;
  }

  .top::after {
    border: 2px solid rgba(255, 248, 241, 0.08);
  }

  .bottom::after {
    border: 2px solid rgba(0, 61, 43, 0.06);
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell top">
      <span class="icon">calendar_month</span>
      <div class="title">立即預約</div>
      <div class="subtitle">Book</div>
    </div>
    <div class="cell top">
      <span class="icon">call</span>
      <div class="title">聯絡電話</div>
      <div class="subtitle">Call</div>
    </div>
    <div class="cell top">
      <span class="icon">event_note</span>
      <div class="title">我的預約</div>
      <div class="subtitle">Bookings</div>
    </div>
    <div class="cell bottom">
      <span class="icon">content_cut</span>
      <div class="title">服務項目</div>
      <div class="subtitle">Services</div>
    </div>
    <div class="cell bottom">
      <span class="icon">event_repeat</span>
      <div class="title">取消／改期</div>
      <div class="subtitle">Change</div>
    </div>
    <div class="cell bottom">
      <span class="icon">payments</span>
      <div class="title">匯款資訊</div>
      <div class="subtitle">Payment</div>
    </div>
  </div>
<script>
  (function() {
    const params = new URLSearchParams(location.search);
    const w = parseInt(params.get("w"), 10) || 2500;
    const h = parseInt(params.get("h"), 10) || 1686;
    const grid = document.querySelector(".grid");
    grid.style.width = w + "px";
    grid.style.height = h + "px";

    const vmin = Math.min(w, h);
    document.querySelectorAll(".icon").forEach((el) => {
      el.style.fontSize = (vmin * 0.083) + "px";
      el.style.marginBottom = (vmin * 0.021) + "px";
    });
    document.querySelectorAll(".title").forEach((el) => {
      el.style.fontSize = (vmin * 0.0545) + "px";
    });
    document.querySelectorAll(".subtitle").forEach((el) => {
      el.style.fontSize = (vmin * 0.0202) + "px";
      el.style.marginTop = (vmin * 0.0118) + "px";
    });
    document.querySelectorAll(".cell::after");
  })();
</script>
</body>
</html>
