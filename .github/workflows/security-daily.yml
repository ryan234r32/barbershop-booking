# Daily security audit — runs every morning Taipei time, commits a markdown
# report to docs/security-reports/. Free tier scan that catches the 90%:
#   - npm audit         → known-CVE dependency vulnerabilities
#   - gitleaks          → committed secrets / API keys
#   - trivy fs          → filesystem vuln scan (deps, Dockerfile, IaC)
#   - secret patterns   → simple regex sweep for env-style strings in code
#
# For deeper LLM-assisted analysis (STRIDE / OWASP / threat modelling) run
# /cso comprehensive locally — that part isn't replicable in CI without
# Anthropic credit.
#
# Trigger: cron daily at 03:00 UTC = 11:00 Taipei (so reports are ready when
# the owner opens the laptop). Also runnable on demand via workflow_dispatch.

name: security-daily

on:
  schedule:
    # 03:00 UTC = 11:00 Asia/Taipei
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write   # so the workflow can commit the report back to main
  security-events: write  # if we ever wire SARIF uploads

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      # Pin to `main` regardless of which ref the workflow_dispatch was triggered
      # from. Without this, a manual run from a feature branch would later push
      # that branch's tip to main alongside the report. Codex P1 (2026-04-27).
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps (no scripts so postinstall hooks skip)
        run: npm ci --ignore-scripts

      - name: Compute report date (Taipei)
        id: today
        run: |
          DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          mkdir -p docs/security-reports

      # ─── 1. npm audit (CVE deps) ───
      - name: npm audit
        id: audit
        run: |
          set +e
          npm audit --omit=dev --json > /tmp/audit.json
          AUDIT_EXIT=$?
          # Pretty-printable summary for the report (errors don't fail step).
          npm audit --omit=dev > /tmp/audit.txt 2>&1 || true
          echo "exit=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"

      # ─── 2. Gitleaks (secret scan) ───
      - name: Gitleaks scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── 3. Trivy filesystem scan ───
      - name: Trivy filesystem scan
        id: trivy
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          scan-type: fs
          format: table
          output: /tmp/trivy.txt
          severity: HIGH,CRITICAL
          exit-code: "0"   # don't fail the workflow; we only report

      # ─── 4. Static checks: typecheck + lint as a freshness signal ───
      - name: Typecheck
        id: tsc
        continue-on-error: true
        run: npx tsc --noEmit > /tmp/tsc.txt 2>&1 && echo "ok=true" >> "$GITHUB_OUTPUT" || echo "ok=false" >> "$GITHUB_OUTPUT"

      # ─── 5. Compose markdown report ───
      - name: Compose daily report
        run: |
          REPORT="docs/security-reports/${{ steps.today.outputs.date }}.md"
          {
            echo "# Daily Security Report — ${{ steps.today.outputs.date }} (Taipei)"
            echo ""
            echo "Auto-generated by \`.github/workflows/security-daily.yml\`. For deep LLM-assisted analysis run \`/cso comprehensive\` locally."
            echo ""
            echo "## Summary"
            echo ""
            if [ "${{ steps.audit.outputs.exit }}" = "0" ]; then
              echo "- ✅ npm audit: no vulnerabilities found"
            else
              echo "- ⚠️ npm audit: vulnerabilities found (see details below)"
            fi
            if [ "${{ steps.tsc.outputs.ok }}" = "true" ]; then
              echo "- ✅ TypeScript: clean"
            else
              echo "- ⚠️ TypeScript: errors present"
            fi
            echo ""
            echo "---"
            echo ""
            echo "## npm audit (production deps)"
            echo ""
            echo "\`\`\`"
            cat /tmp/audit.txt | head -200
            echo "\`\`\`"
            echo ""
            echo "## Trivy filesystem scan (HIGH/CRITICAL)"
            echo ""
            echo "\`\`\`"
            head -200 /tmp/trivy.txt 2>/dev/null || echo "(trivy ran but produced no output)"
            echo "\`\`\`"
            echo ""
            echo "## Typecheck"
            echo ""
            if [ "${{ steps.tsc.outputs.ok }}" = "true" ]; then
              echo "Clean."
            else
              echo "\`\`\`"
              head -100 /tmp/tsc.txt
              echo "\`\`\`"
            fi
            echo ""
            echo "## Notes"
            echo ""
            echo "- Gitleaks output is in the workflow run logs (we don't commit raw secrets to the report)."
            echo "- This report covers: dependency CVEs, filesystem vulns, type errors, committed secrets."
            echo "- Out of scope (run \`/cso comprehensive\` locally): STRIDE threat modelling, OWASP Top 10 with code analysis, LLM trust-boundary review, business-logic auth flows."
          } > "$REPORT"

      # ─── 6. Commit the report ───
      - name: Commit report back to main
        run: |
          REPORT="docs/security-reports/${{ steps.today.outputs.date }}.md"
          git config user.name "security-bot"
          git config user.email "security-bot@users.noreply.github.com"
          # Pathspec-restricted add — even if other files were modified during
          # the workflow (e.g. cache writes), only the report can be staged.
          git add -- "$REPORT"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(security): daily report ${{ steps.today.outputs.date }}"
            # Explicit `main:main` — never `HEAD:main`. With actions/checkout
            # pinned to `main` above this is belt-and-braces, but safer in case
            # someone tweaks the checkout step later.
            git push origin main:main
          fi
